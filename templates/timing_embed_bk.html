<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timing Calculation Tool</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 20px;
      background: #1f2937;
      color: white;
    }
    .topbar h1 {
      margin: 0;
      font-size: 20px;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .back-btn, .open-btn {
      display: inline-block;
      padding: 8px 14px;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
    }
    .back-btn { background: #2563eb; }
    .open-btn { background: #16a34a; }
    .page {
      padding: 16px;
    }
    .notice {
      margin-bottom: 12px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
    }
    .frame-wrap {
      width: 100%;
      height: calc(100vh - 140px);
      min-height: 720px;
      background: white;
      border: 1px solid #dbe4f0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    .tiny {
      font-size: 12px;
      color: #6b7280;
      margin-top: 10px;
    }
    @media (max-width: 760px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
      .frame-wrap {
        height: calc(100vh - 190px);
        min-height: 640px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Timing Calculation Tool</h1>
    <div class="actions">
      <a href="{{ timing_url }}" class="open-btn" target="_blank" rel="noopener noreferrer">Open Direct</a>
      <a href="/" class="back-btn">Back to Dashboard</a>
    </div>
  </div>

  <div class="page">
    <div class="notice">
      The Timing Calculator is running as a separate Streamlit app and is displayed here through an embedded frame.
      If the embedded view is blocked or looks cramped, use <b>Open Direct</b>.
    </div>

    <div class="frame-wrap">
      <iframe src="{{ timing_url }}" title="Timing Calculation Tool"></iframe>
    </div>

    <div class="tiny">
      Timing app URL: {{ timing_host }}
    </div>
  </div>
</body>
</html>
